# toolkits-ocr - Proyecto de Servicio OCR

project:
  name: "PBG-MS-OCR (Finanzas)"
  description: "Servicio OCR para extraccion de UUIDs de facturas Xero"

tasks:
  # ============================================
  # SETUP - Configuracion inicial
  # ============================================

  - name: "1.1 SETUP-01: Estructura de proyecto Python/FastAPI"
    section: "Setup"
    assignee: "P1"
    notes: |
      Crear estructura base del proyecto segun reglas del proyecto.
      
      Requisitos:
      - Crear directorios src/, tests/, docker/
      - Archivos __init__.py en paquetes
      - main.py con FastAPI basico
      - Referencia: PROJECT_STRUCTURE.md
      
      Criteria de aceptacion:
      - Proyecto compila sin errores
      - Estructura sigue convenciones PBG
      
      **Tiempo estimado**: 2 horas

  - name: "1.2 SETUP-02: Docker y docker-compose configurados"
    section: "Setup"
    assignee: "P1"
    notes: |
      Configurar contenedorizacion del servicio OCR.
      
      Requisitos:
      - Dockerfile con Python 3.11, Tesseract OCR, dependencias
      - docker-compose.yml con servicios: ocr-service, redis, rabbitmq
      - Configuracion de volumenes y networks
      - Health checks en contenedores
      - Referencia: NOMENCLATURE.md para nombres de contenedores
      
      Criteria de aceptacion:
      - docker-compose up levanta todos los servicios
      - Contenedor de OCR accesible desde host
      
      **Tiempo estimado**: 2 horas

  - name: "1.3 SETUP-03: Logging con Structlog configurado"
    section: "Setup"
    assignee: "P1"
    notes: |
      Configurar logging estructurado siguiendo estandar PBG.
      
      Requisitos:
      - Copiar src/utils/logging.py del template PBGMicroServices
      - Integrar con main.py
      - Configurar JSON output en production
      - Console output en development
      - Referencia: OBSERVABILITY.md
      
      Criteria de aceptacion:
      - Logs aparecen en formato JSON
      - Contexto incluye: service, environment, timestamp
      
      **Tiempo estimado**: 1 hora

  - name: "1.4 SETUP-04: Health check endpoints"
    section: "Setup"
    assignee: "P1"
    notes: |
      Crear endpoints de salud del servicio.
      
      Requisitos:
      - GET /health - Health basico
      - GET /health/ready - Readiness con dependencias
      - Responder con estado y version del servicio
      - Referencia: RUNBOOK.md
      
      Criteria de aceptacion:
      - Endpoints responden 200 OK
      - /health/ready verifica conexiones a Redis/RabbitMQ
      
      **Tiempo estimado**: 1 hora

  # ============================================
  # CORE OCR - Nucleo del servicio
  # ============================================

  - name: "2.1 OCR-01: Endpoint POST /ocr con validacion"
    section: "Core OCR"
    assignee: "P1"
    notes: |
      Crear endpoint principal del servicio OCR.
      
      Requisitos:
      - POST /api/v1/ocr
      - Validar request con Pydantic: document_base64, filename, invoice_id
      - Validar tamano maximo de PDF (configurable)
      - Autenticacion via API Key
      - Rate limiting basico
      
      Request ejemplo:
      {
        "documentBase64": "JVBERi0x...",
        "filename": "factura.pdf",
        "invoiceId": "INV-001"
      }
      
      Response ejemplo:
      {
        "success": true,
        "uuids": ["ABC12345-..."],
        "confidence": 0.95,
        "ocrSource": "tesseract"
      }
      
      Criteria de aceptacion:
      - Endpoint acepta PDF en base64
      - Retorna estructura de respuesta valida
      - Maneja errores de validacion (422)
      
      **Tiempo estimado**: 3 horas

  - name: "2.2 OCR-02: Integracion con Tesseract OCR"
    section: "Core OCR"
    assignee: "P1"
    notes: |
      Implementar procesamiento de PDFs con Tesseract.
      
      Requisitos:
      - Instalar pytesseract en el contenedor
      - Convertir PDF a imagenes (pdf2image)
      - Procesar cada pagina con Tesseract
      - Extraer texto completo del documento
      - Manejo de PDFs con multiple paginas
      - Timeout configurable para procesamiento
      
      Dependencies:
      - pytesseract
      - pdf2image
      - Pillow
      
      Criteria de aceptacion:
      - PDF se procesa correctamente
      - Texto extraido es legible
      - Timeout funciona (default 120s)
      
      **Tiempo estimado**: 4 horas

  - name: "2.3 OCR-03: Extraccion de UUIDs con regex"
    section: "Core OCR"
    assignee: "P1"
    notes: |
      Extraer UUIDs del texto extraido por OCR.
      
      Requisitos:
      - Regex para patron UUID Xero: [0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}
      - Normalizar a mayusculas
      - Eliminar duplicados
      - Calcular confidence score
      - Tests unitarios para funcion de extraccion
      
      Criteria de aceptacion:
      - UUIDs validos se extraen correctamente
      - No hay falsos positivos
      - Funcion es testable
      
      **Tiempo estimado**: 2 horas

  - name: "2.4 OCR-04: Manejo de errores robusto"
    section: "Core OCR"
    assignee: "P1"
    notes: |
      Implementar manejo de errores segun patrones del proyecto.
      
      Requisitos:
      - Custom exceptions (OcrServiceError, ValidationError)
      - Exception handlers en FastAPI
      - Logging estructurado de errores
      - Respuestas de error consistentes
      
      Estructura de error:
      {
        "success": false,
        "error": {
          "code": "ERROR_CODE",
          "message": "Descripcion del error"
        }
      }
      
      Manejar casos:
      - PDF corrupto o invalido
      - Timeout en procesamiento
      - Base64 invalido
      - Errores de Tesseract
      
      Referencia: ERROR_HANDLING.md
      
      **Tiempo estimado**: 2 horas

  # ============================================
  # INTEGRACION - Conexiones externas
  # ============================================

  - name: "3.1 INT-01: Autenticacion API Key"
    section: "Integracion"
    assignee: "P1"
    notes: |
      Implementar seguridad del endpoint OCR.
      
      Requisitos:
      - Validar header x-api-key
      - Configurar multiples API keys (separadas por coma)
      - Keys configuradas via variables de entorno
      - Retornar 401 si key es invalida
      
      Variables de entorno:
      - API_KEYS=key1,key2,key3
      
      Criteria de aceptacion:
      - Request sin x-api-key retorna 401
      - Request con key invalida retorna 401
      - Request con key valida permite acceso
      
      **Tiempo estimado**: 1 hora

  - name: "3.2 INT-02: Funcion Apps Script para OCR"
    section: "Integracion"
    assignee: "P1"
    notes: |
      Crear funcion en Apps Script para integrar con servicio.
      
      Requisitos:
      - Funcion sendPdfToEcrOcr(pdfBlob, invoiceId, filename)
      - Convertir blob a base64
      - Llamar endpoint /ocr con POST
      - Manejar timeout (configurable)
      - Retry logic basico
      
      Configuracion en PropertiesService:
      - EC2_OCR_ENDPOINT
      - EC2_OCR_API_KEY
      - EC2_OCR_TIMEOUT_MS
      
      Referencia: GOOGLE_APPS_SCRIPT.md
      
      **Tiempo estimado**: 2 horas

  - name: "3.3 INT-03: Integracion con flujo Xero existente"
    section: "Integracion"
    assignee: "P1"
    notes: |
      Modificar flujo existente para usar nuevo servicio OCR.
      
      Requisitos:
      - Reemplazar llamada a Google OCR con llamada al servicio EC2
      - Fallback opcional a Google OCR si EC2 falla
      - Actualizar escribir resultados en Sheets
      - Mantener compatibilidad con flujo actual
      
      Flujo actual:
      1. fetchXeroAct() - Trae facturas
      2. pdfOcrUuidFromAttachments() - Descarga y procesa
      
      Nuevo flujo:
      1. fetchXeroAct() - Sin cambios
      - pdfOcrUuidFromAttachments() - Llama a EC2 OCR en vez de Google OCR
      
      Criteria de aceptacion:
      - Flujo completo funciona sin errores
      - UUIDs se escriben en Sheets correctamente
      
      **Tiempo estimado**: 3 horas

  - name: "3.4 INT-04: Documentacion de integracion"
    section: "Integracion"
    assignee: "P1"
    notes: |
      Documentar como integrar el servicio OCR.
      
      Contenido requerido:
      - Como configurar variables en Apps Script
      - Ejemplo de uso de funcion
      - Formato de request/response
      - Codigos de error
      - Como diagnosticar problemas
      
      Referencia: PROJECT_STRUCTURE.md para estructura de docs
      
      **Tiempo estimado**: 1 hora

  # ============================================
  # TESTING - Pruebas
  # ============================================

  - name: "4.1 TEST-01: Tests unitarios de modelos"
    section: "Testing"
    assignee: "P1"
    notes: |
      Crear tests unitarios para modelos Pydantic.
      
      Requisitos:
      - Tests para OcrRequest: validacion de campos obligatorios, validacion de emails
      - Tests para OcrResponse: serializacion, valores por defecto
      - Tests para configuraciones
      
      Estructura: tests/unit/test_models.py
      
      Referencia: UNIT_TESTS.md
      
      Criteria de aceptacion:
      - Coverage >= 80% en modelos
      - Todos los tests pasan
      
      **Tiempo estimado**: 2 horas

  - name: "4.2 TEST-02: Tests unitarios de servicios"
    section: "Testing"
    assignee: "P1"
    notes: |
      Crear tests unitarios para logica de negocio.
      
      Requisitos:
      - Tests para funcion de extraccion de UUIDs
      - Tests para funcion de validacion
      - Tests para manejo de errores
      
      Estructura: tests/unit/test_services.py
      
      Referencia: UNIT_TESTS.md
      
      Criteria de aceptacion:
      - Coverage >= 80% en servicios
      - Tests siguen patron Arrange-Act-Assert
      
      **Tiempo estimado**: 2 horas

  - name: "4.3 TEST-03: Tests de integracion API"
    section: "Testing"
    assignee: "P1"
    notes: |
      Crear tests de integracion para endpoints.
      
      Requisitos:
      - Tests para /health endpoint
      - Tests para /ocr endpoint
      - Tests de autenticacion API Key
      - Tests de manejo de errores
      
      Estructura: tests/integration/test_api.py
      
      Referencia: UNIT_TESTS.md
      
      Criteria de aceptacion:
      - Todos los endpoints probados
      - Casos de exito y error
      
      **Tiempo estimado**: 2 horas

  - name: "4.4 TEST-04: Pruebas end-to-end con facturas reales"
    section: "Testing"
    assignee: "P1"
    notes: |
      Realizar pruebas con facturas reales de Xero.
      
      Requisitos:
      - Descargar 5-10 facturas reales de Xero
      - Procesar con servicio OCR
      - Verificar extraccion de UUIDs
      - Comparar con Google OCR (si esta disponible)
      - Documentar resultados
      
      Criteria de aceptacion:
      - Al menos 80% de exitos en extraccion
      - Documentar casos de fallo
      
      **Tiempo estimado**: 2 horas

  - name: "4.5 TEST-05: Pruebas de carga basicas"
    section: "Testing"
    assignee: "P1"
    notes: |
      Realizar pruebas de carga del servicio.
      
      Requisitos:
      - Prueba de stress: 10 requests concurrentes
      - Medir latencia promedio
      - Verificar que no hay memory leaks
      - Verificar logs bajo carga
      
      Criteria de aceptacion:
      - Latencia promedio < 30 segundos por PDF
      - Sin errores bajo carga
      
      **Tiempo estimado**: 1 hora

  # ============================================
  # OBSERVABILIDAD - Monitoreo y operaciones
  # ============================================

  - name: "5.1 OBS-01: Sentry integrado"
    section: "Observabilidad"
    assignee: "P1"
    notes: |
      Integrar Sentry para tracking de errores.
      
      Requisitos:
      - Configurar sentry-sdk en main.py
      - Integracion FastAPI
      - Integracion Starlette
      - Configurar DSN via variable de entorno
      - Traces sampling: 0.1 production, 1.0 development
      
      Variables de entorno:
      - SENTRY_DSN=https://...@sentry.io/...
      
      Criteria de aceptacion:
      - Errores aparecen en Sentry dashboard
      - Stack traces son legibles
      - Tags incluyen service y environment
      
      Referencia: OBSERVABILITY.md
      
      **Tiempo estimado**: 2 horas

  - name: "5.2 OBS-02: Health checks completos"
    section: "Observabilidad"
    assignee: "P1"
    notes: |
      Mejorar health checks con verificacion de dependencias.
      
      Requisitos:
      - /health/ready verifica Redis
      - /health/ready verifica RabbitMQ
      - /health/ready verifica Tesseract
      - Responder con estado de cada dependencia
      
      Response ejemplo:
      {
        "status": "ready",
        "checks": {
          "redis": {"healthy": true},
          "rabbitmq": {"healthy": true},
          "tesseract": {"healthy": true}
        }
      }
      
      **Tiempo estimado**: 1 hora

  - name: "5.3 OBS-03: Runbook de operaciones"
    section: "Observabilidad"
    assignee: "P1"
    notes: |
      Crear guia de operaciones completa.
      
      Contenido requerido:
      - Comandos Docker comunes (start, stop, logs, restart)
      - Comandos de troubleshooting
      - Como verificar salud del servicio
      - Como ver logs
      - Contactos de escalation
      - Procedimientos de recovery
      
      Referencia existente: .agents/skills/rules/RUNBOOK.md
      
      **Tiempo estimado**: 2 horas

  - name: "5.4 OBS-04: Script de deploy para EC2"
    section: "Observabilidad"
    assignee: "P1"
    notes: |
      Automatizar despliegue a EC2.
      
      Requisitos:
      - Script bash para build y deploy
      - Manejo de variables de entorno
      - Health check post-deploy
      - Rollback basico si falla
      
      El script debe:
      1. Construir imagen Docker
      2. Subir a registry (opcional)
      3. Deploy en EC2
      4. Verificar salud
      
      **Tiempo estimado**: 2 horas

  - name: "5.5 OBS-05: Documentacion final del proyecto"
    section: "Observabilidad"
    assignee: "P1"
    notes: |
      Completar documentacion del proyecto.
      
      Contenido requerido:
      - README.md actualizado con instrucciones de uso
      - API documentation
      - Changelog
      - Licencia
      
      Referencia: CONVENTIONS.md para documentacion
      
      **Tiempo estimado**: 1 hora
